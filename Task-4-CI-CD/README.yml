## Workflow Overview

1. Code is pushed to the GitHub repository.
2. GitHub Actions automatically triggers the workflow.
3. GitHub connects to the EC2 instance using SSH.
4. Website files are copied to the EC2 server.
5. Apache serves the updated website.
6. Changes are deployed automatically without manual intervention.

---

## GitHub Actions Workflow

The workflow file `deploy.yml` performs the following actions:

- Checks out the repository.
- Connects to the EC2 instance using SSH.
- Copies website files to the server.
- Deploys the files to the Apache web root directory.

---

## GitHub Secrets Used

The following repository secrets were configured:

| Secret Name | Purpose |
|-------------|---------|
| HOST | EC2 Public IP Address |
| USERNAME | EC2 Username |
| SSH_KEY | Private SSH Key used for authentication |

