# Task 4 - CI/CD Pipeline Using GitHub Actions and AWS EC2

## Objective

To implement a Continuous Integration and Continuous Deployment (CI/CD) pipeline using GitHub Actions and automatically deploy a website to an AWS EC2 instance.

---

## Tools and Technologies Used

- GitHub
- GitHub Actions
- AWS EC2 (Ubuntu)
- SSH
- Apache Web Server
- HTML

